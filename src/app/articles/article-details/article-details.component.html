<div id="bodyDiv">
    <p-confirmDialog />
    <app-header class="header"></app-header>
    <div id="contentWrapper">

        <div *ngIf="isLoggedIn" id="actionButtonsDivLogged">
            <div *ngIf="!isEditMode" id="nonEditingMode">
                <p-button *ngIf="!isEditMode" label="Go back" severity="info" icon="pi pi-arrow-left"
                    [style]="{'height': '35px', 'width': 'auto', 'margin': '5px 5px 5px 5px'}" (onClick)="goBack()" />
                <p-button *ngIf="!isEditMode" label="Edit" severity="secondary" icon="pi pi-pencil"
                    [style]="{'height': '35px', 'width': 'auto', 'margin': '5px 5px 5px 5px'}"
                    (onClick)="enableEditMode()" />
                <p-button *ngIf="!isEditMode" label="Delete" severity="danger" icon="pi pi-trash"
                    [style]="{'height': '35px', 'width': 'auto', 'margin': '5px 5px 5px 5px'}"
                    (onClick)="deleteArticle()" />
            </div>
            <div *ngIf="isEditMode" id="editingMode">
                <p-button icon="pi pi-times" label="Cancel" severity="secondary"
                    [style]="{'height': '35px', 'width': 'auto', 'margin': '5px 5px 5px 5px'}"
                    (onClick)="cancelEdit()" />
                <p-button icon="pi pi-check" label="Update" severity="success"
                    [style]="{'height': '35px', 'width': 'auto', 'margin': '5px 5px 5px 5px'}"
                    (onClick)="updateArticle()" />
            </div>
        </div>

        <div *ngIf="!isLoggedIn" id="actionButtonsDivNotLogged">
            <p-button *ngIf="!isLoggedIn" id="goBackButton" label="Go back" severity="info" icon="pi pi-arrow-left"
                [style]="{'height': '35px', 'width': 'auto', 'margin': '5px 5px 5px 5px'}" (onClick)="goBack()" />
        </div>

        <div id="titleDivNonEdit" *ngIf="!isEditMode">{{article?.title}}</div>

        <div id="titleDivEdit" *ngIf="isEditMode">
            <p-floatlabel>
                <label> Title: </label>
                <input pInputText [(ngModel)]="editedArticle.title" [style]="{'width': '960px'}" class="w-full" />
            </p-floatlabel>
            <small *ngIf="fieldErrors['title']" class="p-error">{{ fieldErrors['title'] }}</small>
        </div>

        <div id="typeDiv" *ngIf="isEditMode">
            <p-floatlabel>
                <label id="typeLabel"> Type: </label>
                <p-dropdown *ngIf="areArticleTypesPopulated()" id="articleTypesDropdown" [options]="articleTypes"
                    [(ngModel)]="selectedType" optionLabel="name" placeholder="Select type" />
            </p-floatlabel>
            <small *ngIf="fieldErrors['type']" class="p-error">{{ fieldErrors['type'] }}</small>
        </div>


        <div id="tagsDivNonEdit" *ngIf="!isEditMode">
            <div *ngFor="let tag of article?.tags" style="display: inline-block; margin-left: 5px;">
                <p-chip [style]="{
                    'height': '30px',
                    'width': 'auto',
                    'background-color': '#515457',
                    'color': '#ffffff'
                    }">{{ tag }}</p-chip>
            </div>
        </div>
        <div id="tagsDivEdit" *ngIf="isEditMode">
            <p-floatLabel>
                <label> Tags: </label>
                <div>
                    <p-chips [(ngModel)]="editedArticle.tags" [separator]="','" placeholder="Add tags"></p-chips>
                </div>
            </p-floatLabel>
        </div>

        <div id="contentDivNonEdit" *ngIf="!isEditMode" #contentContainer>
            <div id="contentOutline">
                <div [innerHTML]="processContent()"></div>
            </div>
        </div>

        <div id="contentDivEdit" *ngIf="isEditMode">
            <p-editor id="editor" placeholder="Write your content here!" [(ngModel)]="editedArticle.content"
                [style]="{ height: '22rem' }"   
                />
            <small *ngIf="fieldErrors['content']" class="p-error">{{ fieldErrors['content'] }}</small>

        </div>

        <div *ngIf="isLoggedIn" id="actionButtonsDivLogged">
            <div *ngIf="isEditMode" id="editingMode">
                <p-button icon="pi pi-times" label="Cancel" severity="secondary"
                    [style]="{'height': '35px', 'width': 'auto', 'margin': '5px 5px 5px 5px'}"
                    (onClick)="cancelEdit()" />
                <p-button icon="pi pi-check" label="Update" severity="success"
                    [style]="{'height': '35px', 'width': 'auto', 'margin': '5px 5px 5px 5px'}"
                    (onClick)="updateArticle()" />
            </div>
        </div>

        <div *ngIf="shouldSpinnerWork" class="overlay">
            <p-progressSpinner styleClass="overlay-spinner"></p-progressSpinner>
        </div>

    </div>
    <app-footer class="footer" id="footer"></app-footer>
</div>
